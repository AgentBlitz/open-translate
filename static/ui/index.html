<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>open-translate</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <p class="privacy">Text and files you send are never logged, stored, cached, or written to disk on the server &mdash; every request runs in-memory on the GPU and is discarded the moment the response finishes.</p>
    </header>

    <main id="text-pane" class="panes">
      <section class="pane" aria-label="Source">
        <div class="pane-head">
          <select id="source-lang" aria-label="Source language">
            <option value="auto">Detect language</option>
          </select>
          <button id="clear-btn" type="button" aria-label="Clear input" title="Clear">×</button>
        </div>
        <textarea
          id="source-text"
          placeholder="Enter text"
          maxlength="5000"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        ></textarea>
        <div class="pane-foot">
          <span id="detected-label" class="detected"></span>
          <span id="char-count" class="counter">0 / 5000</span>
        </div>
      </section>

      <button id="swap-btn" type="button" class="swap" aria-label="Swap languages" title="Swap">⇄</button>

      <section class="pane" aria-label="Translation">
        <div class="pane-head">
          <select id="target-lang" aria-label="Target language"></select>
          <button id="copy-btn" type="button" aria-label="Copy translation" title="Copy">Copy</button>
        </div>
        <textarea id="target-text" readonly placeholder="Translation"></textarea>
        <div class="pane-foot">
          <span id="status" class="status"></span>
        </div>
      </section>
    </main>

    <section id="docs-pane" class="docs" aria-label="Document translation">
      <div class="docs-card">
        <div class="docs-langs">
          <select id="doc-source-lang" aria-label="Document source language">
            <option value="auto">Detect language</option>
          </select>
          <span class="docs-arrow">→</span>
          <select id="doc-target-lang" aria-label="Document target language"></select>
        </div>
        <div
          id="drop-zone"
          class="drop-zone"
          tabindex="0"
          role="button"
          aria-label="Drop a file or click to choose"
        >
          <p class="drop-title">Drop a document or image</p>
          <p class="drop-hint">.docx · .pdf · .jpg · .png · .webp · .bmp · .tiff (up to 25&nbsp;MB)</p>
          <p id="drop-file" class="drop-file"></p>
          <input
            id="drop-input"
            type="file"
            accept=".pdf,.docx,.jpg,.jpeg,.png,.webp,.bmp,.tif,.tiff,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/*"
            hidden
          />
        </div>
        <div class="docs-actions">
          <button id="doc-translate-btn" type="button" class="btn-primary" disabled>Translate &amp; download</button>
          <span id="doc-status" class="status"></span>
        </div>
      </div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
